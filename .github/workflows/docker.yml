name: Build and Push

on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Utworz QEMU
              uses: docker/setup-qemu-action@v3

            - name: Utworz Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login DockerHub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Login GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Wygenerowanie tagowania
              id: zmienna
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/${{ github.repository_owner }}/pogoda
                  tags: |
                    type=sha
                    type=raw,value=latest,enable={{is_default_branch}}

            - name: Zbudowanie obrazu do skanowania
              uses: docker/build-push-action@v6
              with:
                  context: .
                  platforms: linux/amd64
                  tags: pogoda:scan
                  load: true
                  cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/kolokwium2_lab_docker-cache:latest

            - name: Skanowanie obrazu
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: pogoda:scan
                  severity: HIGH,CRITICAL
                  exit-code: 1
                  
            - name: Build and Push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: ${{ steps.zmienna.outputs.tags }}
                  cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/kolokwium2_lab_docker-cache:latest
                  cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/kolokwium2_lab_docker-cache:latest,mode=max